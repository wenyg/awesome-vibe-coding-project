name: 解析投稿 Issue 并开 PR

on:
  issues:
    types: [labeled, opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  parse:
    # 仅处理带 submission 标签的 Issue
    if: contains(join(github.event.issue.labels.*.name, ','), 'submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 解析 Issue + AI 审核/润色/打标签
        id: parse
        run: node scripts/parse-issue.mjs
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          # GitHub Models 用内置 token（需 models: read 权限），无需单独 OpenAI key
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI 判定为垃圾/违规则评论并标记（不开 PR）
        if: steps.parse.outputs.spam == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🤖 自动审核未通过：${{ steps.parse.outputs.reason }}

          如果你认为这是误判，请补充说明，维护者会人工复核。"
          gh issue edit ${{ github.event.issue.number }} --add-label "needs-review"

      - name: 创建 / 更新 PR
        if: steps.parse.outputs.spam != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: 投稿项目 ${{ steps.parse.outputs.title }} (#${{ github.event.issue.number }})"
          branch: submission/issue-${{ github.event.issue.number }}
          delete-branch: true
          title: "[投稿] ${{ steps.parse.outputs.title }} (#${{ github.event.issue.number }})"
          body: |
            自动根据投稿 Issue #${{ github.event.issue.number }} 生成。

            - 项目：${{ steps.parse.outputs.title }}
            - 数据文件：`src/content/projects/${{ steps.parse.outputs.slug }}.json`

            请审核内容（封面、链接、分类是否准确），无误后合并即上线。
            合并后该项目的热度将由 Issue #${{ github.event.issue.number }} 上的 👍 表情数驱动。
          labels: submission
