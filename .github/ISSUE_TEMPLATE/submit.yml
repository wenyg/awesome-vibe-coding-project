name: 投稿一个 vibe coding 项目
description: 分享你用 AI 做的小程序 / 小游戏 / 网站 / 工具，让更多人看到！
title: "[投稿] 你的项目名"
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        感谢投稿！分享你用 AI 做的东西，让更多人看到。
        - 标 `*` 的为必填，其余留空也行（封面、昵称等会自动补全）。
        - 截图、二维码请直接把图片**拖拽上传**到输入框里（可一次拖多张，GitHub 自动生成链接，无需图床）。
        - 提交后会自动审核，通过即生成预览，维护者确认后上线。

  - type: input
    id: title
    attributes:
      label: 项目名称 *
      placeholder: 例如：今天吃什么
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 一句话简介 *
      description: 一句话说清楚这个项目是干嘛的，越具体越吸引人。
      placeholder: 输入冰箱里有的食材，AI 帮你随机生成今晚菜谱。
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 项目分类 *
      options:
        - 小程序
        - 小游戏
        - 网站
        - 工具
        - 其他
    validations:
      required: true

  - type: input
    id: madeWith
    attributes:
      label: 用了哪些 AI 工具做的？
      description: 这是 vibe coding 项目最有意思的地方！用逗号分隔，比如 Cursor、ChatGPT、v0、Claude、Trae 等。
      placeholder: Cursor, ChatGPT, v0

  - type: textarea
    id: story
    attributes:
      label: 项目故事 / 亮点（选填）
      description: 多说几句更容易被看到、被做成视频。比如为什么做、怎么用 AI 做出来的、遇到什么坑、有什么亮点。支持换行。
      placeholder: |
        我是个完全不会写代码的设计师，用 Cursor 边问边写，三个晚上做出了这个小工具……
        最得意的是 XXX 功能，AI 帮我省了大概一周。

  - type: textarea
    id: cover
    attributes:
      label: 项目截图（选填，可多张）
      description: 把项目截图直接拖拽上传到这里，可一次上传多张。**第一张作为封面**（建议 16:10），其余会在详情页以 App Store 风格的画廊展示。留空则自动按项目名+分类生成一张封面。
      placeholder: 拖拽上传一张或多张截图；留空会自动生成封面

  - type: input
    id: liveUrl
    attributes:
      label: 在线体验链接（网站/工具类填这个）
      description: 网页能直接打开的项目填这里。小程序/小游戏没有网址可不填。
      placeholder: https://your-project.com

  - type: textarea
    id: qrcode
    attributes:
      label: 体验二维码（仅小程序/小游戏需要）
      description: 小程序 / 小游戏拖拽上传二维码图片，方便扫码体验。网站、工具等有网址的项目请忽略此项，留空即可。
      placeholder: 网站/工具类留空；小程序/小游戏拖拽上传二维码

  - type: input
    id: repoUrl
    attributes:
      label: 源码 / GitHub 链接
      placeholder: https://github.com/yourname/yourproject

  - type: input
    id: downloadUrl
    attributes:
      label: 下载链接
      description: App / 安装包下载地址（可选）。
      placeholder: https://...

  - type: input
    id: tags
    attributes:
      label: 标签
      description: 用逗号分隔，最多 4 个，便于检索。
      placeholder: 美食, GPT, 效率

  - type: input
    id: author
    attributes:
      label: 你的昵称（选填）
      description: 留空将自动使用你的 GitHub 用户名。想用别的展示名就填这里。
      placeholder: 留空则用 GitHub 用户名

  - type: input
    id: authorUrl
    attributes:
      label: 你的主页 / 联系方式（选填）
      description: 留空将自动使用你的 GitHub 主页。想展示个人站/社交主页就填这里。
      placeholder: 留空则用 GitHub 主页

  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我确认这是我本人参与制作的项目，且内容合法合规。
          required: true
